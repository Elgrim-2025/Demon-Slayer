<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>귀멸의 칼날 3D SAMPLE</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body{margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;}
        /*3D 뷰어 스타일*/
        model-viewer{
            width: 100%;
            height: 80vh;
            background-color: #f5f5f5;
            --poster-color: transparent;
        }

        /*AR 진입 버튼 */
        #ar-button {
            background-color: #2B3138;
            border-radius: 10px;
            border: none;
            position: absolute;
            bottom: 20px;
            left: 50px;
            transform: translateX(-50%);
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* AR 안내 메시지 오버레이 */
        #ar-hint {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.65);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <model-viewer
    src="assets/tanjiro.glb"
    ios-src="https://modelviewer.dev/shared-assets/models/NeilArmstrong.usdz"
    alt="귀멸의 칼날 3D 모델"
    ar
    ar-modes="scene-viewer webxr quick-look"
    ar-placement="floor"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    auto-rotate>
<button slot="ar-button" id="ar-button">
    AR 보기
</button>
</model-viewer>

<div id="ar-hint">바닥을 천천히 비추어주세요</div>

<script>
    const modelViewer = document.querySelector('model-viewer');
    const arHint = document.getElementById('ar-hint');

    modelViewer.addEventListener('ar-status', (event) => {
        const status = event.detail.status;
        console.log("AR 상태:", status);

        if (status === 'session-started') {
            arHint.style.display = 'block';
        } else if (status === 'object-placed' || status === 'failed') {
            arHint.style.display = 'none';
        }
    });

    modelViewer.addEventListener('ar-tracking', (event) => {
        if (event.detail.status === 'tracking') {
            arHint.style.display = 'none';
        }
    });

    modelViewer.addEventListener('error', (error) => {
        console.error("WebAR 로드 에러", error);
    });
</script>
    
</body>
</html>
