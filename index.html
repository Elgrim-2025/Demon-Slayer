<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>귀멸의 칼날 3D SAMPLE</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body{margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;}
        /*3D 뷰어 스타일*/
        model-viewer{
            width: 100%;
            height: 80vh;
            background-color: #f5f5f5;
            --poster-color: transparent;
        }

        /*AR 진입 버튼 */
        #ar-button {
            background-color: #2B3138;
            border-radius: 10px;
            border: none;
            position: absolute;
            bottom: 20px;
            left: 50px;
            transform: translateX(-50%);
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgbx(0,0,0,0.1);
            cursor: pointer;
        }
    </style>
</head>
<body>
    <model-viewer
    src="assets/tanjiro.glb"
    ios-src="https://modelviewer.dev/shared-assets/models/NeilArmstrong.usdz"
    alt="귀멸의 칼날 3D 모델"
    ar
    ar-modes="webxr quick-look"
    ar-placement="floor"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    auto-rotate>
<button slot="ar-button" id ="ar-button">
    지면 인식
</button>
</model-viewer>
<script>
    const modelviewer = document.querySelector('model-viewer');

    //안드로이드 지면인식 핸들링
    modelviewer.addEventListener('ar-status' , (event) => {
        const status = event.detail.status;
        console.log("현재 AR 상태", status);

        if(status === 'session-started'){
            alert("바닥을 천천히 비추어주십시오.");
        }else if(status==='object-placed'){
            console.log("배치 완");
        }
    });

    //에러 핸들링
    modelviewer.addEventListener('error', (error) => {
        console.error("WebAR 로드 에러", error);
    });
</script>
    
</body>
</html>
