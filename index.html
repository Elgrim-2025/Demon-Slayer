<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>귀멸의 칼날 3D SAMPLE</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body{margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh;}
        /*3D 뷰어 스타일*/
        model-viewer{
            width: 100%;
            height: 80vh;
            background-color: #f5f5f5;
            --poster-color: transparent;
        }

        /*AR 진입 버튼 */
        #ar-button {
            background-color: #2B3138;
            border-radius: 10px;
            border: none;
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 12px 24px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
        }

        /* AR 안내 메시지 오버레이 */
        #ar-hint {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.65);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <model-viewer
    src="assets/tanjiro.glb"
    ios-src="https://modelviewer.dev/shared-assets/models/Astronaut.usdz"
    alt="귀멸의 칼날 3D 모델"
    ar
    ar-modes="scene-viewer webxr quick-look"
    ar-placement="floor"
    camera-controls
    touch-action="pan-y"
    shadow-intensity="1"
    auto-rotate>
<button slot="ar-button" id="ar-button">
    AR 보기
</button>
</model-viewer>

<div id="ar-hint">바닥을 천천히 비추어주세요</div>

<script>
    const modelViewer = document.querySelector('model-viewer');
    const arHint = document.getElementById('ar-hint');

    modelViewer.addEventListener('ar-status', (event) => {
        const status = event.detail.status;
        console.log("AR 상태:", status);

        if (status === 'session-started') {
            arHint.style.display = 'block';
        } else if (status === 'object-placed' || status === 'failed') {
            arHint.style.display = 'none';
        }
    });

    modelViewer.addEventListener('ar-tracking', (event) => {
        if (event.detail.status === 'tracking') {
            arHint.style.display = 'none';
        }
    });

    modelViewer.addEventListener('error', (error) => {
        console.error("WebAR 로드 에러", error);
    });

    // 인앱 브라우저 감지 및 외부 브라우저 유도
    (function() {
        var userAgent = navigator.userAgent.toLowerCase();
        var currentUrl = window.location.href;

        var isInAppBrowser = /kakaotalk|naver|instagram|fbav|fb_iab/i.test(userAgent);

        if (isInAppBrowser) {
            var isAndroid = /android/i.test(userAgent);
            var isIOS = /iphone|ipad|ipod/i.test(userAgent);

            if (/kakaotalk/i.test(userAgent)) {
                if (isIOS) {
                    // iOS 카카오톡: 스킴 시도 후 실패하면 모달 표시
                    var kakaoScheme = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(currentUrl);
                    var timer = setTimeout(function() {
                        document.addEventListener('DOMContentLoaded', function() {
                            showBrowserGuide();
                        });
                        if (document.readyState !== 'loading') showBrowserGuide();
                    }, 1500);
                    window.location.href = kakaoScheme;
                    window.addEventListener('blur', function() { clearTimeout(timer); });
                } else {
                    window.location.href = 'kakaotalk://web/openExternal?url=' + encodeURIComponent(currentUrl);
                }
            } else if (isAndroid) {
                var intentUrl = 'intent://' + currentUrl.replace(/https?:\/\//, '') +
                    '#Intent;scheme=https;package=com.android.chrome;end';
                window.location.href = intentUrl;
            } else if (isIOS) {
                document.addEventListener('DOMContentLoaded', function() {
                    showBrowserGuide();
                });
            }
        }

        function showBrowserGuide() {
            var guideHtml =
                '<div id="browserGuide" style="' +
                'position: fixed; top: 0; left: 0; right: 0; bottom: 0; ' +
                'background: rgba(0,0,0,0.8); z-index: 9999; ' +
                'display: flex; align-items: center; justify-content: center;">' +
                '<div style="' +
                'background: white; padding: 30px; border-radius: 12px; ' +
                'max-width: 320px; text-align: center; margin: 20px;">' +
                '<h3 style="margin-bottom: 15px; font-size: 18px;">외부 브라우저에서 열어주세요</h3>' +
                '<p style="color: #666; font-size: 14px; line-height: 1.6; margin-bottom: 20px;">' +
                'AR 기능은 보안상의 이유로<br>인앱 브라우저에서 지원되지 않습니다.<br><br>' +
                '<strong>우측 상단 메뉴(⋮)에서<br>"다른 브라우저로 열기"를 선택해주세요.</strong>' +
                '</p>' +
                '<button onclick="document.getElementById(\'browserGuide\').style.display=\'none\'" ' +
                'style="background: #4285f4; color: white; border: none; ' +
                'padding: 12px 30px; border-radius: 6px; cursor: pointer; font-size: 14px;">' +
                '확인' +
                '</button>' +
                '</div>' +
                '</div>';
            document.body.insertAdjacentHTML('beforeend', guideHtml);
        }
    })();
</script>
    
</body>
</html>
